[robot]
hardware = "R1_PRO"

# comment out keys you don't want to publish
enable_publish = [
    #"left_arm",
    "left_gripper",
    #"left_ee_pose",
    #"right_arm",
    "right_gripper",
    "right_ee_pose",
    "torso",
    #"chassis",
]


[basic]
use_ehi = false
control_frequency = 15.0
step_mode = "async" # Optional["sync", "async"]
action_steps = 32

[model]
ckpt_dir = "/home/user/bench_ws/model_res/bench_r1pro_g0tiny_gift"
processor = "default" # Optional["default", "cuda"]
use_trt = false
is_torch_compile = false

[trajectory]
ensemble_mode = "HATO"
execution_mode = "EE_POSE"


[websocket]
use_websocket = true
host = "0.0.0.0"
port = 8080

[instruction]
use_vlm = false #
bbox_as_instruction = false
image_condition_lang_prefix = false
pp_lower_half = false
image_as_condition = false

# ============================================
# 仿真模式配置 (Simulation Mode)
# ============================================
# 启用仿真模式后，EFMNode 将连接到 GalaxeaManipSim
# 而不是真机 ROS2 话题

[simulation]
enabled = false                    # 是否启用仿真模式
env_name = "R1ProBlocksStackEasy-v0"  # Gym 环境名称
use_random_policy = true           # 使用 pseudo random policy 测试
random_seed = 42                   # 随机种子（可复现）
headless = true                    # 无头模式（false=显示窗口）
